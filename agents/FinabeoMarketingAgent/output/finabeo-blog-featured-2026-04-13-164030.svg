    Enterprise FinOps &amp; Agentic AI Partner
  </text>

  <!-- Decorative elements -->
  <circle cx="1120" cy="60" r="40" fill="#FFB81C" opacity="0.3"/>
  <circle cx="50" cy="625" r="30" fill="#FFFFFF" opacity="0.2"/>
</svg>
