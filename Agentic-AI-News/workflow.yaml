id: agentic-ai-news-digest
version: 1.0.0
entry_node: news_collector

nodes:
  - id: news_collector
    node_type:
      custom_worker:
        handler: collect_news
        handler_file: handlers.py
    config:
      payload:
        status: collecting

  - id: digest_generator
    node_type:
      llm_call:
        model: openai/gpt-4o-mini
        messages_path: input.messages
        heal: true
    config:
      output_schema:
        type: object
        properties:
          title:
            type: string
          publication_date:
            type: string
          executive_summary:
            type: string
          enterprise_adoption:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
                date:
                  type: string
              required: [headline, summary, source, region, url, date]
          challenges:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                severity:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
                date:
                  type: string
              required: [headline, summary, severity, source, region, url, date]
          opportunities:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                market_potential:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
                date:
                  type: string
              required: [headline, summary, market_potential, source, region, url, date]
          evolving_trends:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                trend_indicator:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
                date:
                  type: string
              required: [headline, summary, trend_indicator, source, region, url, date]
          footer:
            type: string
        required: [title, publication_date, executive_summary, enterprise_adoption, challenges, opportunities, evolving_trends]
      user_input_prompt: |
        Generate a professional "Agentic AI Weekly Digest" newsletter from the collected news below.

        Collected news (each item has headline, url, source, date, region, raw_content, and date_verified):
        {{nodes.news_collector.output.news_items}}

        TODAY'S DATE IS: 2026-05-28

        STRICT RULES:
        1. FIRST: Read each item's raw_content. If content specifically discusses events from 2025 or earlier as its main topic, EXCLUDE. If it briefly references past data for context but is clearly current, INCLUDE
        2. NEXT: Extract the most specific date from the raw_content for each item you include (e.g. "May 27, 2026", "March 2026"). If no explicit date is found, use "2026-05-28" (today) as default
        3. The "url" field must be the EXACT url from the source data — NEVER modify, truncate, or fabricate a URL
        4. NEVER create a URL like "https:****" or any placeholder — skip the item instead
        5. Generate a 2-3 sentence summary from the raw_content for each item (do not copy headlines)
        6. Return a mix across all 4 categories — aim for 2-5 items per category, but never fabricate items

        If there are fewer than 5 items in a category, return only what exists - do NOT fabricate items.

        Classification:
        - enterprise_adoption: companies deploying AI agents at scale
        - challenges: problems, risks, failures, regulation issues
        - opportunities: investments, partnerships, new markets
        - evolving_trends: new technologies, innovations, shifts

        Scoring:
        - enterprise_adoption: impact_score 1-10
        - challenges: severity low/medium/high
        - opportunities: market_potential low/medium/high
        - evolving_trends: trend_indicator emerging/growing/maturing

        Output JSON:
        - title: "Agentic AI Weekly Digest - 2026-05-28"
        - publication_date: "2026-05-28"
        - executive_summary: 3-4 sentences on key themes
        - enterprise_adoption: items with (headline, summary, source, region, url, date)
        - challenges: items with (headline, summary, severity, source, region, url, date)
        - opportunities: items with (headline, summary, market_potential, source, region, url, date)
        - evolving_trends: items with (headline, summary, trend_indicator, source, region, url, date)
        - footer: "Generated by SimpleAgents"

        Return JSON only. No commentary.

  - id: finalizer
    node_type:
      custom_worker:
        handler: finalize_digest
        handler_file: handlers.py
    config:
      payload:
        title: '{{nodes.digest_generator.output.title}}'
        publication_date: '{{nodes.digest_generator.output.publication_date}}'
        executive_summary: '{{nodes.digest_generator.output.executive_summary}}'
        enterprise_adoption: '{{nodes.digest_generator.output.enterprise_adoption}}'
        challenges: '{{nodes.digest_generator.output.challenges}}'
        opportunities: '{{nodes.digest_generator.output.opportunities}}'
        evolving_trends: '{{nodes.digest_generator.output.evolving_trends}}'
        footer: '{{nodes.digest_generator.output.footer}}'

edges:
  - from: news_collector
    to: digest_generator
  - from: digest_generator
    to: finalizer