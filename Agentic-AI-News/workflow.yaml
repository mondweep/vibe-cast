id: agentic-ai-news-digest
version: 1.0.0
entry_node: news_collector

nodes:
  - id: news_collector
    node_type:
      custom_worker:
        handler: collect_news
        handler_file: handlers.py
    config:
      payload:
        status: collecting

  - id: digest_generator
    node_type:
      llm_call:
        model: openai/gpt-4o-mini
        messages_path: input.messages
        heal: true
    config:
      output_schema:
        type: object
        properties:
          title:
            type: string
          publication_date:
            type: string
          executive_summary:
            type: string
          enterprise_adoption:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
              required: [headline, summary, source, region]
          challenges:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                severity:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
              required: [headline, summary, severity, source, region]
          opportunities:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                market_potential:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
              required: [headline, summary, market_potential, source, region]
          evolving_trends:
            type: array
            items:
              type: object
              properties:
                headline:
                  type: string
                summary:
                  type: string
                trend_indicator:
                  type: string
                source:
                  type: string
                region:
                  type: string
                url:
                  type: string
              required: [headline, summary, trend_indicator, source, region]
          footer:
            type: string
        required: [title, publication_date, executive_summary, enterprise_adoption, challenges, opportunities, evolving_trends]
      user_input_prompt: |
        Generate a professional "Agentic AI Weekly Digest" newsletter from the collected news below.

        Collected news:
        {{nodes.news_collector.output.news_items}}

        Your task:
        1. Classify each news item into ONE of these categories:
           - enterprise_adoption: companies deploying AI agents at scale
           - challenges: problems, risks, failures, regulation issues
           - opportunities: investments, partnerships, new markets
           - evolving_trends: new technologies, innovations, shifts

        2. Score and rank within each category:
           - enterprise_adoption: impact_score 1-10
           - challenges: severity low/medium/high
           - opportunities: market_potential low/medium/high
           - evolving_trends: trend_indicator emerging/growing/maturing

        3. Create the JSON output with these fields:
        - title: "Agentic AI Weekly Digest - YYYY-MM-DD"
        - publication_date: today's date
        - executive_summary: 3-4 sentences on key themes
        - enterprise_adoption: top 5 items (headline, summary, source, region, url)
        - challenges: top 4 items (headline, summary, severity, source, region, url)
        - opportunities: top 5 items (headline, summary, market_potential, source, region, url)
        - evolving_trends: top 5 items (headline, summary, trend_indicator, source, region, url)
        - footer: "Generated by SimpleAgents"

        IMPORTANT: Include a url field for each item if available from the source news. Return JSON only.

  - id: finalizer
    node_type:
      custom_worker:
        handler: finalize_digest
        handler_file: handlers.py
    config:
      payload:
        title: '{{nodes.digest_generator.output.title}}'
        publication_date: '{{nodes.digest_generator.output.publication_date}}'
        executive_summary: '{{nodes.digest_generator.output.executive_summary}}'
        enterprise_adoption: '{{nodes.digest_generator.output.enterprise_adoption}}'
        challenges: '{{nodes.digest_generator.output.challenges}}'
        opportunities: '{{nodes.digest_generator.output.opportunities}}'
        evolving_trends: '{{nodes.digest_generator.output.evolving_trends}}'
        footer: '{{nodes.digest_generator.output.footer}}'

edges:
  - from: news_collector
    to: digest_generator
  - from: digest_generator
    to: finalizer