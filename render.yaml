# Render Blueprint — LecturePulse
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lecture-pulse
    runtime: node
    region: frankfurt
    plan: free
    rootDir: lecture-pulse
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
