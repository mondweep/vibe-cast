openapi: "3.1.0"
info:
  title: MedImage — Medical Image Analysis API
  description: |
    Medical image analysis powered by Google's MedGemma model.
    Supports radiology, dermatology, pathology, and ophthalmology modalities.

    **Disclaimer**: All analyses are AI-generated and intended for research
    and educational purposes only. They do not constitute medical advice.
  version: "0.1.0"
  contact:
    name: MedImage
  license:
    name: Health AI Developer Foundations

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.medimage.example.com
    description: Production (placeholder)

paths:
  /api/v1/analyze:
    post:
      operationId: analyzeImage
      summary: Analyze a medical image
      description: |
        Upload a medical image for AI-assisted analysis. Returns structured
        findings with severity classifications and anatomical locations.
      tags: [analysis]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, modality]
              properties:
                image:
                  type: string
                  format: binary
                  description: Medical image file (JPEG, PNG, BMP, TIFF, DICOM). Max 20 MB.
                modality:
                  $ref: "#/components/schemas/Modality"
                query:
                  type: string
                  maxLength: 500
                  description: Optional custom analysis query. If omitted, default modality query is used.
      responses:
        "200":
          description: Analysis completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
              example:
                modality: radiology
                summary: "Bilateral lung fields are clear. Heart size is normal. No acute cardiopulmonary abnormality."
                findings:
                  - description: "Heart size is within normal limits with a cardiothoracic ratio of approximately 0.45"
                    severity: normal
                    location: Mediastinum
                  - description: "Bilateral lung fields are clear without focal consolidation, effusion, or pneumothorax"
                    severity: normal
                    location: Bilateral lung fields
                raw_output: '{"summary": "...", "findings": [...]}'
                disclaimer: "This analysis is generated by an AI model and is intended for research and educational purposes only..."
                metadata:
                  model_id: google/medgemma-4b-it
                  inference_time_ms: 3421
                  image_resolution: "896x896"
                  parse_success: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_format:
                  summary: Unsupported file format
                  value:
                    error: invalid_format
                    detail: "Unsupported file type: .gif. Allowed: [.jpg, .jpeg, .png, .bmp, .tiff, .dcm]"
                    field: image
                file_too_large:
                  summary: File exceeds size limit
                  value:
                    error: file_too_large
                    detail: "File too large: 25.3MB. Max: 20MB"
                    field: image
                invalid_modality:
                  summary: Unsupported modality
                  value:
                    error: invalid_modality
                    detail: "Unsupported modality: cardiology. Supported: [radiology, dermatology, pathology, ophthalmology]"
                    field: modality
        "503":
          description: Model not ready
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: model_not_ready
                detail: "Model is loading. Please retry after 30 seconds."

  /api/v1/modalities:
    get:
      operationId: listModalities
      summary: List supported imaging modalities
      description: Returns all supported medical imaging modalities with descriptions and conditions.
      tags: [modalities]
      responses:
        "200":
          description: Modalities listed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModalitiesResponse"
              example:
                modalities:
                  - id: radiology
                    name: Radiology
                    description: "Chest X-rays, CT scans"
                    supported_conditions: ["pneumonia", "cardiomegaly", "pleural effusion", "fractures"]
                  - id: dermatology
                    name: Dermatology
                    description: "Clinical and dermatoscopic skin images"
                    supported_conditions: ["melanoma", "basal cell carcinoma", "psoriasis", "eczema"]

  /api/v1/health:
    get:
      operationId: healthCheck
      summary: API health check
      description: Returns API status, model loading state, and uptime.
      tags: [system]
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: healthy
                model_id: google/medgemma-4b-it
                model_loaded: true
                uptime_seconds: 3600

components:
  schemas:
    Modality:
      type: string
      enum: [radiology, dermatology, pathology, ophthalmology]
      description: Medical imaging modality

    Finding:
      type: object
      required: [description, severity]
      properties:
        description:
          type: string
          description: Detailed description of the finding
        severity:
          type: string
          enum: [normal, mild, moderate, severe]
          description: Severity classification
        location:
          type: string
          nullable: true
          description: Anatomical location, null if not applicable

    ResponseMetadata:
      type: object
      required: [model_id, inference_time_ms, image_resolution, parse_success]
      properties:
        model_id:
          type: string
          description: Model identifier used for inference
        inference_time_ms:
          type: integer
          description: Inference time in milliseconds
        image_resolution:
          type: string
          description: "Image resolution as 'WxH' after preprocessing"
        parse_success:
          type: boolean
          description: Whether structured JSON extraction from model output succeeded

    AnalyzeResponse:
      type: object
      required: [modality, summary, findings, raw_output, disclaimer, metadata]
      properties:
        modality:
          $ref: "#/components/schemas/Modality"
        summary:
          type: string
          maxLength: 300
          description: Brief overall summary of findings
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
          minItems: 1
        raw_output:
          type: string
          description: Full raw model output for debugging
        disclaimer:
          type: string
          description: Medical disclaimer, always present
        metadata:
          $ref: "#/components/schemas/ResponseMetadata"

    ModalityInfo:
      type: object
      required: [id, name, description, supported_conditions]
      properties:
        id:
          $ref: "#/components/schemas/Modality"
        name:
          type: string
        description:
          type: string
        supported_conditions:
          type: array
          items:
            type: string

    ModalitiesResponse:
      type: object
      required: [modalities]
      properties:
        modalities:
          type: array
          items:
            $ref: "#/components/schemas/ModalityInfo"

    HealthResponse:
      type: object
      required: [status, model_id, model_loaded, uptime_seconds]
      properties:
        status:
          type: string
          enum: [healthy, loading, error]
        model_id:
          type: string
        model_loaded:
          type: boolean
        uptime_seconds:
          type: number

    ErrorResponse:
      type: object
      required: [error, detail]
      properties:
        error:
          type: string
          description: Machine-readable error code
        detail:
          type: string
          description: Human-readable error message
        field:
          type: string
          nullable: true
          description: Which field caused the error
