# Netlify Configuration for Mondweep Chakravorty Website

# Build settings
[build]
  publish = "."  # Publish root directory
  command = ""   # No build command needed (static site)

# Redirects and rewrites
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Custom domain (update after deployment)
# [context.production]
#   environment = { NETLIFY_CUSTOM_DOMAIN = "mondweep.com" }

# Form handling (optional, if you add a contact form later)
# [build.processing.images]
#   compress = true
