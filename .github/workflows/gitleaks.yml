name: Secret scan (gitleaks)

# Runs on every push and PR plus a weekly full-repo sweep. Catches anything
# that slips past the developer's pre-commit hook or GitHub Push Protection.

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (full history for repo-wide scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the check (and the PR / push status) on any finding.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
